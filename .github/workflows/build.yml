name: Build Samsung M31 Kernel

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y bash git make libssl-dev curl bc pkg-config m4 libtool automake autoconf clang llvm lld python3

      - name: Clone and Setup Kernel
        run: |
          # Source code clone karna
          git clone https://github.com/Gojikovi/kernel_samsung_universal9611 kernel_source
          
          # Folder verify karna
          echo "Checking contents of kernel_source folder:"
          ls -F kernel_source

      - name: Build Kernel
        run: |
          cd kernel_source
          
          # HID Support manually enable karna
          echo "Enabling HID support..."
          echo "CONFIG_USB_HID=y" >> arch/arm64/configs/m31_defconfig
          echo "CONFIG_USB_HIDDEV=y" >> arch/arm64/configs/m31_defconfig
          echo "CONFIG_HIDRAW=y" >> arch/arm64/configs/m31_defconfig
          
          # Build process shuru karna
          echo "Starting build..."
          python3 build_kernel.py --oneui --target=m31 --no-ksu

      - name: Upload Kernel Image
        uses: actions/upload-artifact@v3
        with:
          name: M31-Kernel-Image
          path: kernel_source/out/arch/arm64/boot/Image
