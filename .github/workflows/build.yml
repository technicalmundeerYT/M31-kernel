name: Build TechnicalMundeer Kernel
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v3
        with:
          submodules: recursive

      - name: Setup Build Environment
        run: |
          sudo apt update
          # Dependencies aur Clang compiler install karna
          sudo apt install -y bc bison build-essential flex libc6-dev libncurses5-dev libssl-dev python3 clang llvm lld

      - name: Build TechnicalMundeer Kernel
        run: |
          # Permission set karna
          chmod +x build_kernel.py
          
          # Branding aur Build process
          export EXTRAVERSION="-TechnicalMundeer"
          
          # Compiler ko system ka use karna (No manual download needed)
          export CC=clang
          export LD=ld.lld
          
          python3 build_kernel.py --target m31 --oneui
