name: Build TechnicalMundeer Kernel
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v3
        with:
          submodules: recursive

      - name: Setup Build Environment
        run: |
          sudo apt update
          sudo apt install -y bash git make libssl-dev curl bc pkg-config m4 libtool automake autoconf python3
          mkdir -p toolchain

      - name: Download WeebX Clang
        run: |
          # WeebX Clang ko download karne ka direct tarika
          wget -q https://github.com/XSans0/WeebX-Clang/releases/latest/download/WeebX-Clang-linux.tar.gz -O toolchain.tar.gz
          tar -xzf toolchain.tar.gz -C toolchain --strip-components=1

      - name: Build TechnicalMundeer Kernel
        run: |
          chmod +x build_kernel.py
          export EXTRAVERSION="-TechnicalMundeer"
          export PATH=$GITHUB_WORKSPACE/toolchain/bin:$PATH
          python3 build_kernel.py --target m31 --oneui
