name: Build Kernel
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Download Source Code
        run: |
          # Seedha ZIP download kar rahe hain, git ki jhanjhat khatam
          wget https://github.com/Exynos9611Development/android_kernel_samsung_universal9611/archive/refs/heads/main.zip
          unzip main.zip
          mv android_kernel_samsung_universal9611-main/* .
      
      - name: Build Kernel
        run: |
          sudo apt update
          sudo apt install -y bc bison build-essential flex gcc-aarch64-linux-gnu libc6-dev libncurses5-dev libncurses5 libssl-dev
          
          # NetHunter HID Configs
          echo "CONFIG_USB_HID=y" >> arch/arm64/configs/m31_defconfig
          echo "CONFIG_USB_G_HID=y" >> arch/arm64/configs/m31_defconfig
          
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          make m31_defconfig
          make -j$(nproc)
