name: Build Grass Kernel
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v3
        with:
          submodules: recursive # Submodules zaroori hain

      - name: Setup Build Environment
        run: |
          sudo apt update
          sudo apt install -y bc bison build-essential flex libc6-dev libncurses5-dev libssl-dev
          # Note: Agar toolchain repo mein nahi hai, toh use download karne ki script yahan aayegi

      - name: Run Build Script
        run: |
          # HID aur KSU ke saath build chalane ke liye
          python3 build_kernel.py --target m31 --oneui
