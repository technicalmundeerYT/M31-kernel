name: Build Kernel with HID
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential gcc-aarch64-linux-gnu libssl-dev bison flex bc git

      - name: Build Kernel
        run: |
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          # Enable HID support via script before compiling
          sed -i 's/# CONFIG_USB_HID is not set/CONFIG_USB_HID=y/' arch/arm64/configs/m31_defconfig
          make m31_defconfig
          make -j$(nproc)

      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: Kernel-Image
          path: arch/arm64/boot/Image
