name: Build Kernel

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v3

      - name: Set up dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential gcc-aarch64-linux-gnu libssl-dev bison flex bc git

      - name: Build Kernel
        run: |
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          make m31_defconfig
          make -j$(nproc)

      - name: Upload Kernel Image
        uses: actions/upload-artifact@v3
        with:
          name: Image
          path: arch/arm64/boot/Image
