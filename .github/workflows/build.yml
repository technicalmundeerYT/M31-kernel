name: Build TechnicalMundeer Kernel
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v3
        with:
          submodules: recursive

      - name: Setup Build Environment
        run: |
          sudo apt update
          sudo apt install -y bc bison build-essential flex libc6-dev libncurses5-dev libssl-dev
          mkdir -p toolchain

      - name: Download and Extract Toolchain
        run: |
          wget -q [LINK_YAHA_DAALEIN] -O toolchain.tar.gz
          tar -xzf toolchain.tar.gz -C toolchain --strip-components=1

      - name: Build TechnicalMundeer Kernel
        run: |
          # Custom branding
          export EXTRAVERSION="-TechnicalMundeer"
          python3 build_kernel.py --target m31 --oneui
