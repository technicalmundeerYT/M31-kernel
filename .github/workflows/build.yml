name: Build TechnicalMundeer Kernel
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v3
        with:
          submodules: recursive

      - name: Setup Build Environment
        run: |
          sudo apt update
          sudo apt install -y bc bison build-essential flex libc6-dev libncurses5-dev libssl-dev python3
          mkdir -p toolchain

      - name: Download Toolchain
        run: |
          curl -L -o toolchain.tar.gz "https://github.com/Khangaroo/clang/releases/download/v15.0.6/clang-r450784d.tar.gz"
          tar -xzf toolchain.tar.gz -C toolchain --strip-components=1

      - name: Build TechnicalMundeer Kernel
        run: |
          export EXTRAVERSION="-TechnicalMundeer"
          export PATH=$GITHUB_WORKSPACE/toolchain/bin:$PATH
          python3 build_kernel.py --target m31 --oneui
