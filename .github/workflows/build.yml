name: Build TechnicalMundeer Kernel
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v3
        with:
          submodules: recursive

      - name: Setup KernelSU
        run: |
          # Pehle check karo hum kahan hain
          ls -R
          # Script ko main folder mein run karo
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s v0.9.5

      - name: Build Kernel
        run: |
          # Yahan apni sahi command do jo script accept karti hai
          # Agar --target kaam nahi kar raha, toh dekho kya chal raha hai
          python3 build_kernel.py --oneui
