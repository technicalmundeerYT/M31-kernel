name: Build TechnicalMundeer Kernel
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v3
        with:
          submodules: recursive

      - name: Debug and Build
        run: |
          echo "--- Folder Listing ---"
          ls -R
          echo "--- Checking for drivers folder ---"
          find . -name "drivers"
          
          # Folder path ko variable mein le rahe hain
          KERNEL_DIR=$(find . -name "drivers" -exec dirname {} \;)
          echo "Kernel directory found at: $KERNEL_DIR"
          
          cd $KERNEL_DIR
          
          # KernelSU Setup
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s v0.9.5
          
          # Build
          chmod +x build_kernel.py
          python3 build_kernel.py --oneui
