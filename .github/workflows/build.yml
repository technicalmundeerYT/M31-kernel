name: Build Kernel
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        run: |
          # Git configuration fix
          git config --global http.postBuffer 524288000
          # Specific URL cloning
          git clone https://github.com/Exynos9611Development/android_kernel_samsung_universal9611.git .
      
      - name: Build Kernel
        run: |
          sudo apt update
          sudo apt install -y bc bison build-essential flex gcc-aarch64-linux-gnu libc6-dev libncurses5-dev libssl-dev
          
          # NetHunter HID Configs
          echo "CONFIG_USB_HID=y" >> arch/arm64/configs/m31_defconfig
          echo "CONFIG_USB_G_HID=y" >> arch/arm64/configs/m31_defconfig
          
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          make m31_defconfig
          make -j$(nproc)
