name: Build Kernel
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v3
        with:
          repository: 'feds64/android_kernel_samsung_exynos9611'
          ref: 'lineage-19.1'
          path: .
      
      - name: Build Kernel
        run: |
          sudo apt update
          sudo apt install -y bc bison build-essential flex gcc-aarch64-linux-gnu libc6-dev libncurses5-dev libssl-dev
          
          # NetHunter Configs
          echo "CONFIG_USB_HID=y" >> arch/arm64/configs/m31_defconfig
          echo "CONFIG_USB_G_HID=y" >> arch/arm64/configs/m31_defconfig
          
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          make m31_defconfig
          make -j$(nproc)
